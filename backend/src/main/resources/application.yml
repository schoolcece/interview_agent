spring:
  application:
    name: ai-interview-system

  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
    properties:
      hibernate:
        format_sql: true

  datasource:
    url: jdbc:mysql://localhost:13306/interview_db?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&useSSL=false
    username: interview
    password: interview_dev_password
    driver-class-name: com.mysql.cj.jdbc.Driver

  data:
    redis:
      host: localhost
      port: 6379
      database: 0
      password: redis_dev_password

  jackson:
    default-property-inclusion: non_null
    serialization:
      write-dates-as-timestamps: false

server:
  port: 8080
  servlet:
    context-path: /api

jwt:
  secret: 5860d1e74dda7f1ee106f0eb3338b2a4d64aa368c20b5ba7a7716749d64bbc77f24ba355eb466337ede425c9ac7ecfffd4eecd541993972ba5f5dacc9b01662b
  expiration: 86400000
  refresh-expiration: 2592000000

minio:
  endpoint: http://localhost:9000
  access-key: minioadmin
  secret-key: minioadmin_dev
  bucket-resume: resumes
  bucket-audio: audio

agent:
  service:
    url: http://localhost:8000
    timeout: 30000
    planning:
      endpoint: /api/v1/planning
    interview:
      endpoint: /api/v1/interview
    evaluation:
      endpoint: /api/v1/evaluation
    memory:
      endpoint: /api/v1/memory
    reflection:
      endpoint: /api/v1/reflection

cors:
  allowed-origins: http://localhost:5173,http://localhost:3000

logging:
  level:
    root: INFO
    com.ai.interview: DEBUG
